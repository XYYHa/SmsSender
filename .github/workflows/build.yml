name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Reassemble sms_core.py from parts
        run: |
          cat sms_core.part1 sms_core.part2 > sms_core.py
          rm -f sms_core.part1 sms_core.part2
          wc -l sms_core.py

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip openjdk-17-jdk \
            python3-pip python3-dev \
            libltdl-dev libffi-dev libssl-dev \
            autoconf automake cmake curl wget \
            ccache
          sudo update-java-alternatives -s java-1.17.0-openjdk-amd64

      - name: Cache Buildozer global
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-cache-${{ runner.os }}

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.33 buildozer

      - name: Build with Buildzer
        run: |
          buildozer android debug
        env:
          ANDROID_SDK_HOME: /opt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmsSender-APK
          path: bin/*.apk